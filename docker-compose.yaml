version: '3.9'

services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: jobscheduler
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  scheduler:
    build: ./scheduler-service

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/jobscheduler
      DB_USER: admin
      DB_PASS: secret

      KAFKA_SERVERS: kafka:9092

      REDIS_HOST: redis

    depends_on:
      - postgres
      - redis
      - kafka

  executor:
    build: ./executor-service

    ports:
      - "9090:9090"

    environment:
      KAFKA_SERVERS: kafka:9092

    depends_on:
      - kafka

volumes:
  pgdata: