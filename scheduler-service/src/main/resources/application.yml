spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobscheduler}
    username: ${DB_USER:admin}
    password: ${DB_PASS:secret}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:kafka:9092}
    consumer:
      group-id: scheduler-group
      auto-offset-reset: latest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.jobscheduler.scheduler_service.event.JobResultEvent
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  quartz:
    job-store-type: jdbc

    jdbc:
      initialize-schema: always

    properties:
      org:
        quartz:
          scheduler:
            instanceName: JobScheduler
            

          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: qrtz_
            isClustered: false

          threadPool:
            threadCount: 5
            
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer